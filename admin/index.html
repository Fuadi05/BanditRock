<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Syarif Art Stone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="background: var(--primary); color: white; padding: 4px; border-radius: 6px;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        Syarif Art Stone
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item active"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Admin</div>
        <a href="#" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Dasbor</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <!-- Status Cards -->
      <div class="dash-cards">
        <div class="dash-card c-orange">
          <h3 id="c-konf">0</h3>
          <p>Konfirmasi</p>
        </div>
        <div class="dash-card c-green">
          <h3 id="c-setuju">0</h3>
          <p>Disetujui</p>
        </div>
        <div class="dash-card c-blue">
          <h3 id="c-proses">0</h3>
          <p>Diproses</p>
        </div>
        <div class="dash-card c-red">
          <h3 id="c-batal">0</h3>
          <p>Dibatalkan</p>
        </div>
        <div class="dash-card c-purple">
          <h3 id="c-kirim">0</h3>
          <p>Dikirim</p>
        </div>
        <div class="dash-card c-green" style="background: #ECFDF5; border: 1px solid #A7F3D0;">
          <h3 id="c-selesai" style="color: #047857;">0</h3>
          <p style="color: #065F46;">Selesai</p>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 32px;">
        <!-- Mock Pie Chart -->
        <div class="card" style="display: flex; align-items: center; justify-content: center; min-height: 300px;">
          <div style="width: 200px; height: 200px; border-radius: 50%; background: conic-gradient(#A78BFA 0% 35%, #FBBF24 35% 55%, #38BDF8 55% 75%, #E2E8F0 75% 100%); position: relative; display: flex; align-items: center; justify-content: center;">
            <div style="width: 100px; height: 100px; background: white; border-radius: 50%;"></div>
          </div>
        </div>

        <!-- Province Table -->
        <div class="card" style="padding:0;">
          <table>
            <thead>
              <tr>
                <th style="width: 50px;">NO</th>
                <th>PELANGGAN</th>
                <th>STATUS</th>
                <th>TOTAL</th>
              </tr>
            </thead>
            <tbody id="prov-table">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Ambil data pesanan dari API untuk statistik dasbor
      try {
        const res = await fetch(`${API_BASE}/admin/orders`, {
          headers: authHeaders()
        });
        const json = await res.json();

        if (json.success && json.data) {
          const orders = json.data;
          
          let stat = {
            'pending_payment': 0,
            'waiting_verification': 0,
            'paid': 0,
            'processing': 0,
            'shipped': 0,
            'completed': 0,
            'cancelled': 0
          };

          orders.forEach(o => {
            if (stat[o.status] !== undefined) stat[o.status]++;
          });

          document.getElementById('c-konf').textContent = stat['pending_payment'] + stat['waiting_verification'];
          document.getElementById('c-setuju').textContent = stat['paid'];
          document.getElementById('c-proses').textContent = stat['processing'];
          document.getElementById('c-kirim').textContent = stat['shipped'];
          if (document.getElementById('c-selesai')) {
            document.getElementById('c-selesai').textContent = stat['completed'];
          }
          document.getElementById('c-batal').textContent = stat['cancelled'];

          // Tabel pesanan terbaru di dasbor
          const statusLabels = {
            'pending_payment': 'Menunggu Bayar',
            'waiting_verification': 'Verifikasi',
            'paid': 'Disetujui',
            'processing': 'Diproses',
            'shipped': 'Dikirim',
            'completed': 'Selesai',
            'cancelled': 'Dibatalkan'
          };

          document.getElementById('prov-table').innerHTML = orders.length === 0
            ? '<tr><td colspan="4" style="text-align:center;">Belum ada pesanan</td></tr>'
            : orders.slice(0, 5).map((o, idx) => `
                <tr>
                  <td>${idx + 1}</td>
                  <td style="font-weight:700;">${o.nama_pembeli}</td>
                  <td><span style="font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; background:#f1f5f9; color:#475569;">${statusLabels[o.status] || o.status}</span></td>
                  <td style="font-weight:800; color:#0f5132;">${formatRpAdmin(o.total_tagihan)}</td>
                </tr>
              `).join('');
        }
      } catch (err) {
        console.error('Gagal memuat data dasbor:', err);
        document.getElementById('prov-table').innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--danger);">Gagal memuat data</td></tr>';
      }
    });
  </script>
</body>
</html>
