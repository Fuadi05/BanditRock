  <!-- Main Content -->
  <main class="main-content">

          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>

    </header>

    <div class="content-area">
      <div class="card" style="padding: 32px;">
        
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px;">
          <div>
            <h2 style="font-size: 18px; margin-bottom: 4px;">Laporan</h2>
            <p style="font-size: 13px; color: var(--text-muted);">Pembaruan Terakhir: <span id="current-date"></span></p>
            <p style="font-size: 14px; font-weight: 600; margin-top: 12px;">Rata-rata Penjualan: <span id="rata-rata" style="color: var(--primary);">Loading...</span></p>
          </div>
          
          <div style="display: flex; gap: 16px; align-items: center;">
            <select id="filter-bulan" class="form-control" style="width: auto; cursor: pointer; padding: 6px 12px;">
              <option value="1">Januari</option>
              <option value="2">Februari</option>
              <option value="3">Maret</option>
              <option value="4">April</option>
              <option value="5">Mei</option>
              <option value="6">Juni</option>
              <option value="7">Juli</option>
              <option value="8">Agustus</option>
              <option value="9">September</option>
              <option value="10">Oktober</option>
              <option value="11">November</option>
              <option value="12">Desember</option>
            </select>
            <input type="date" id="date-from" class="form-control" style="width: auto; cursor: pointer; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: #F8FAFC; color: var(--text-muted); font-size: 13px;">
            <span style="font-size: 13px; color: var(--text-muted);">sampai</span>
            <input type="date" id="date-to" class="form-control" style="width: auto; cursor: pointer; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: #F8FAFC; color: var(--text-muted); font-size: 13px;">
            <button class="btn-primary" style="background: #F1F5F9; color: var(--text-main); border: 1px solid var(--border-color);">
              Ekspor XLS <i data-lucide="upload" style="width: 14px; margin-left: 8px;"></i>
            </button>
          </div>
        </div>

        <!-- Chart Container -->
        <div style="position: relative; height: 300px; display: flex; align-items: flex-end; justify-content: space-between; border-left: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 0 24px;">
          
          <!-- Y-Axis Labels -->
          <div style="position: absolute; left: -32px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: space-between; color: var(--text-muted); font-size: 12px;">
            <span>50k</span>
            <span>40k</span>
            <span>30k</span>
            <span>20k</span>
            <span>10k</span>
            <span>0k</span>
          </div>

          <!-- Mock Bars -->
          <div style="height: 35%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 65%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 85%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 70%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 25%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 82%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 60%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 30%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 55%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 85%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 70%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 25%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 82%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 60%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
          <div style="height: 30%; width: 24px; background: #A78BFA; border-radius: 4px 4px 0 0;"></div>
        </div>

        <!-- X-Axis Labels -->
        <div style="display: flex; justify-content: space-between; padding: 12px 24px 0 24px; margin-left: 1px; color: var(--text-muted); font-size: 12px;">
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span style="font-weight:bold; color:var(--text-main);">Thu</span>
          <span>Fri</span>
          <span>Sat</span>
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span style="font-weight:bold; color:var(--text-main);">Thu</span>
          <span>Fri</span>
          <span>Sat</span>
          <span>Sun</span>
          <span>Mon</span>
        </div>
        
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});
      
      // Ambil data pertama kali (Bulan 1 / Januari)
      fetchLaporanData(1);

      // Event listener ketika filter bulan diubah
      document.getElementById('filter-bulan').addEventListener('change', function() {
        const bulan = this.value;
        document.getElementById('rata-rata').textContent = 'Loading...';
        fetchLaporanData(bulan);
      });

      // Event listener ketika tanggal diubah
      const dateFrom = document.getElementById('date-from');
      const dateTo = document.getElementById('date-to');
      
      const handleDateChange = () => {
        if(dateFrom.value || dateTo.value) {
          const bulan = document.getElementById('filter-bulan').value;
          document.getElementById('rata-rata').textContent = 'Loading...';
          fetchLaporanData(bulan, true);
        }
      };

      dateFrom.addEventListener('change', handleDateChange);
      dateTo.addEventListener('change', handleDateChange);
    });

    function fetchLaporanData(bulan, isDateFilter = false) {
      // Front-end (Vanilla JS): Menjalankan fetch ke API
      fetch(`https://batumerapi.biz.id/api/laporan?bulan=${bulan}`)
        .then(response => response.json())
        .then(data => {
          // Menerima data JSON dari Back-end dan memperbarui teks di HTML
          if (data && data.mean !== undefined) {
            document.getElementById('rata-rata').textContent = formatRpAdmin(data.mean);
          }
        })
        .catch(error => {
          // Fallback simulasi jika API/Back-end belum benar-benar ada
          console.log("Simulasi fallback: Menghitung rata-rata harian bulan " + bulan + " di dalam memori...");
          setTimeout(() => {
            // Simulasi data berbeda tiap bulan
            let baseVal = 500000;
            let simulatedMean = baseVal * bulan; // Sekadar simulasi
            if (simulatedMean > 3000000) simulatedMean = 3000000 - (bulan * 10000);
            
            // Jika filter tanggal aktif, simulasikan perhitungan rata-rata rentang tanggal tsb
            if (isDateFilter) {
              simulatedMean = simulatedMean * 1.2; // Sedikit dinaikkan untuk simulasi
            }

            // Memperbarui UI
            document.getElementById('rata-rata').textContent = formatRpAdmin(simulatedMean);
          }, 500); // Simulasi delay jaringan
        });
    }
  </script>
</body>
