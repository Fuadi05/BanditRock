<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan - Syarif Art Stone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="background: var(--primary); color: white; padding: 4px; border-radius: 6px;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        Syarif Art Stone
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item active"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Admin</div>
        <a href="profil.html" class="menu-item"><i data-lucide="user"></i> Profil</a>
        <a href="login.html" onclick="logoutAdmin(event)" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Laporan</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <div class="card" style="padding: 32px;">
        
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px;">
          <div>
            <h2 style="font-size: 18px; margin-bottom: 4px;">Laporan</h2>
            <p style="font-size: 13px; color: var(--text-muted);">Pembaruan Terakhir: <span id="current-date"></span></p>
            <p style="font-size: 14px; font-weight: 600; margin-top: 12px;">Rata-rata Penjualan: <span id="rata-rata" style="color: var(--primary);">Loading...</span></p>
          </div>
          
          <div style="display: flex; gap: 16px; align-items: center;">
            <select id="filter-bulan" class="form-control" style="width: auto; cursor: pointer; padding: 6px 12px;">
              <option value="1">Januari</option>
              <option value="2">Februari</option>
              <option value="3">Maret</option>
              <option value="4">April</option>
              <option value="5">Mei</option>
              <option value="6">Juni</option>
              <option value="7">Juli</option>
              <option value="8">Agustus</option>
              <option value="9">September</option>
              <option value="10">Oktober</option>
              <option value="11">November</option>
              <option value="12">Desember</option>
            </select>
            <input type="date" id="date-from" class="form-control" style="width: auto; cursor: pointer; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: #F8FAFC; color: var(--text-muted); font-size: 13px;">
            <span style="font-size: 13px; color: var(--text-muted);">sampai</span>
            <input type="date" id="date-to" class="form-control" style="width: auto; cursor: pointer; padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: #F8FAFC; color: var(--text-muted); font-size: 13px;">
            <button class="btn-primary" style="background: #F1F5F9; color: var(--text-main); border: 1px solid var(--border-color);">
              Ekspor XLS <i data-lucide="upload" style="width: 14px; margin-left: 8px;"></i>
            </button>
          </div>
        </div>

        <!-- Chart Container (Dinamis) -->
        <div id="chart-container" style="position: relative; height: 300px; display: flex; align-items: flex-end; justify-content: center; border-left: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 0 24px;">
          <p style="color: var(--text-muted); font-size: 14px;">Belum ada data laporan penjualan.</p>
        </div>

        <!-- X-Axis Labels -->
        <div id="chart-labels" style="display: flex; justify-content: center; padding: 12px 24px 0 24px; color: var(--text-muted); font-size: 12px;">
        </div>
        
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year: 'numeric'});
      
      // Set default bulan ke bulan saat ini
      const currentMonth = new Date().getMonth() + 1;
      document.getElementById('filter-bulan').value = currentMonth;
      
      // Ambil data pertama kali
      fetchLaporanData();

      // Event listener ketika filter bulan diubah
      document.getElementById('filter-bulan').addEventListener('change', function() {
        document.getElementById('rata-rata').textContent = 'Loading...';
        fetchLaporanData();
      });
    });

    async function fetchLaporanData() {
      const bulan = document.getElementById('filter-bulan').value;
      const year = new Date().getFullYear();
      const bulanStr = `${year}-${String(bulan).padStart(2, '0')}`;

      try {
        const res = await fetch(`${API_BASE}/admin/laporan?bulan=${bulanStr}`, {
          headers: authHeaders()
        });
        const json = await res.json();
        if (handleApiAuthError(res, json)) return;

        if (json.success && json.ringkasan) {
          const { total_transaksi, total_pendapatan } = json.ringkasan;
          
          if (total_transaksi === 0) {
            document.getElementById('rata-rata').textContent = 'Rp 0';
            document.getElementById('chart-container').innerHTML = '<p style="color: var(--text-muted); font-size: 14px;">Belum ada transaksi di bulan ini.</p>';
            document.getElementById('chart-labels').innerHTML = '';
          } else {
            const rataRata = Math.round(total_pendapatan / total_transaksi);
            document.getElementById('rata-rata').textContent = formatRpAdmin(rataRata);
            
            const orders = json.data || [];
            
            // Group sales by Date for the Bar Chart
            const salesByDate = {};
            orders.forEach(o => {
              const d = new Date(o.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
              salesByDate[d] = (salesByDate[d] || 0) + o.total_tagihan;
            });

            const dateKeys = Object.keys(salesByDate);
            const maxVal = Math.max(...Object.values(salesByDate), 1);

            let chartBarsHtml = `
              <div style="display:flex; align-items:flex-end; justify-content:space-around; width:100%; height:100%; padding:20px 10px 10px; gap:16px;">
                ${dateKeys.map(date => {
                  const val = salesByDate[date];
                  const heightPct = Math.max((val / maxVal) * 80, 20);
                  return `
                    <div style="display:flex; flex-direction:column; align-items:center; flex:1; max-width:100px; height:100%; justify-content:flex-end;">
                      <div style="font-size:11px; font-weight:800; color:var(--primary); margin-bottom:6px; white-space:nowrap;">${formatRpAdmin(val)}</div>
                      <div title="${date}: ${formatRpAdmin(val)}" style="width:100%; max-width:54px; height:${heightPct}%; background:linear-gradient(180deg, #7C3AED 0%, #A78BFA 100%); border-radius:8px 8px 0 0; transition:height 0.5s ease; box-shadow:0 4px 6px rgba(124,58,237,0.2);"></div>
                      <div style="font-size:12px; font-weight:700; color:var(--text-muted); margin-top:10px;">${date}</div>
                    </div>
                  `;
                }).join('')}
              </div>
            `;

            document.getElementById('chart-container').innerHTML = chartBarsHtml;
          }
        } else {
          document.getElementById('rata-rata').textContent = 'Rp 0';
        }
      } catch (err) {
        console.error('Gagal memuat laporan:', err);
        document.getElementById('rata-rata').textContent = 'Gagal memuat';
        document.getElementById('chart-container').innerHTML = '<p style="color: var(--danger); font-size: 14px;">Gagal terhubung ke server.</p>';
      }
    }
  </script>
</body>
</html>
