<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - Syarif Art Stone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="background: var(--primary); color: white; padding: 4px; border-radius: 6px;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        Syarif Art Stone
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item active"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Admin</div>
        <a href="#" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Produk</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <form id="add-product-form">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2 style="font-size: 16px;">Tambah Produk</h2>
          <div style="display: flex; gap: 12px;">
            <button type="button" class="btn-primary" style="background: var(--text-main);" onclick="window.history.back()">Batal</button>
            <button type="submit" class="btn-primary">Simpan & Publikasi</button>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
          
          <div style="display: flex; flex-direction: column; gap: 24px;">
            <!-- Left Card -->
            <div class="card" style="display: grid; gap: 16px;">
              <input type="text" id="p-name" class="form-control" placeholder="Nama Produk" required>
              
              <select id="p-cat" class="form-control" required>
                <option value="" disabled selected>Pilih Kategori Produk</option>
                <option value="Alat Dapur">Alat Dapur</option>
                <option value="Interior">Interior</option>
                <option value="Eksterior">Eksterior</option>
                <option value="Ornamen Dinding">Ornamen Dinding</option>
              </select>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <input type="number" id="p-price" class="form-control" placeholder="Harga Jual" required>
                <input type="number" class="form-control" placeholder="Harga Modal">
              </div>

              <input type="text" class="form-control" placeholder="Ukuran (misal: 20x20 cm)">
              
              <select class="form-control">
                <option>Tipe Pesanan</option>
                <option>Ready Stock</option>
                <option>Pre-Order</option>
              </select>
            </div>

            <!-- Description Card -->
            <div class="card" style="display: grid; gap: 16px;">
              <div>
                <label style="font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 8px;">Deskripsi Singkat</label>
                <textarea class="form-control" rows="3" placeholder="..."></textarea>
              </div>
              <div>
                <label style="font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 8px;">Deskripsi Lengkap Produk</label>
                <textarea id="p-desc" class="form-control" rows="5" placeholder="Tuliskan detail produk di sini..."></textarea>
              </div>
            </div>
          </div>

          <!-- Right Card / Image Upload -->
          <div class="card" style="display: flex; flex-direction: column; gap: 16px;">
            <label style="font-size: 12px; font-weight: 600; color: var(--text-muted); display: block;">URL Gambar Utama</label>
            <div id="upload-box" style="border: 2px dashed var(--border-color); border-radius: 8px; padding: 32px; text-align: center; background: #F8FAFC; cursor: pointer;" onclick="document.getElementById('file-upload').click()">
              <i data-lucide="image" style="color: var(--primary); width: 32px; height: 32px; margin-bottom: 8px;"></i>
              <p id="upload-text" style="font-size: 13px; color: var(--primary); font-weight: 600;">Klik untuk Unggah Gambar</p>
              <p style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">Pilih file dari komputer Anda (Maks: 5MB)</p>
            </div>
            <input type="file" id="file-upload" accept="image/png, image/jpeg, image/jpg" style="display: none;" onchange="handleFileUpload(event)">
            <input type="hidden" id="p-img" class="form-control" value="" required>
            
            <label style="font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-top: 16px;">Gambar Tambahan</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <div style="border: 1px dashed var(--border-color); height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #F8FAFC; color: var(--primary); cursor: pointer;">
                <i data-lucide="image"></i>
              </div>
              <div style="border: 1px dashed var(--border-color); height: 80px; border-radius: 8px;"></div>
            </div>
          </div>

        </div>
      </form>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const uploadText = document.getElementById('upload-text');
      uploadText.textContent = 'Mengunggah...';
      const formData = new FormData();
      formData.append('image', file);
      try {
        const res = await fetch(`${API_BASE}/admin/upload`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${getToken()}`
          },
          body: formData
        });
        const json = await res.json();
        if (json.success) {
          document.getElementById('p-img').value = json.url;
          uploadText.textContent = 'Gambar Berhasil Diunggah!';
          document.getElementById('preview-container').style.display = 'block';
          document.getElementById('preview-img').src = json.url;
        } else {
          alert('Gagal mengunggah: ' + (json.error || json.message));
          uploadText.textContent = 'Klik untuk Unggah Gambar';
        }
      } catch (err) {
        alert('Terjadi kesalahan saat mengunggah gambar.');
        uploadText.textContent = 'Klik untuk Unggah Gambar';
      }
    }

    let editId = new URLSearchParams(window.location.search).get('edit');
    document.addEventListener('DOMContentLoaded', async () => {
      if (editId) {
        document.querySelector('.page-title').textContent = 'Edit Produk';
        document.querySelector('h2').textContent = 'Edit Produk';
        try {
          const res = await fetch(`${API_BASE}/produk/${editId}`);
          const json = await res.json();
          if (json.success && json.data) {
            const p = json.data;
            document.getElementById('p-name').value = p.nama;
            document.getElementById('p-cat').value = p.kategori;
            document.getElementById('p-price').value = p.harga_min;
            document.getElementById('p-desc').value = p.deskripsi;
            document.getElementById('p-img').value = p.image_url || '';
            // Checkboxes
            if(p.ukuran && Array.isArray(p.ukuran)) {
              document.querySelectorAll('#size-checkboxes input').forEach(cb => {
                cb.checked = p.ukuran.includes(cb.value);
              });
            }
          }
        } catch(err) {}
      }
    });

    document.getElementById('add-product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Menyimpan...';
      submitBtn.disabled = true;

      const produk = {
        nama: document.getElementById('p-name').value,
        kategori: document.getElementById('p-cat').value,
        harga_min: parseInt(document.getElementById('p-price').value) || 0,
        harga_max: parseInt(document.getElementById('p-price').value) || 0,
        deskripsi: document.getElementById('p-desc').value,
        image_url: document.getElementById('p-img').value,
      };

      try {
        const url = editId ? `${API_BASE}/admin/produk/${editId}` : `${API_BASE}/admin/produk`;
        const res = await fetch(url, {
          method: editId ? 'PUT' : 'POST',
          headers: authHeaders(),
          body: JSON.stringify(produk)
        });
        const json = await res.json();

        if (json.success) {
          alert('Produk berhasil ditambahkan ke database!');
          if (!editId) window.location.href = 'produk.html';
          else alert('Produk berhasil diperbarui!');
        } else {
          alert('Gagal: ' + (json.message || 'Terjadi kesalahan'));
        }
      } catch (err) {
        alert('Tidak dapat terhubung ke server.');
      } finally {
        submitBtn.textContent = 'Save & Publish';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
