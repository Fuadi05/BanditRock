<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List - Syarif Art Stone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="background: var(--primary); color: white; padding: 4px; border-radius: 6px;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        Syarif Art Stone
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item active"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Admin</div>
        <a href="#" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Produk</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 16px;">Ringkasan Inventaris</h2>
        <a href="tambah-produk.html" class="btn-primary"><i data-lucide="plus"></i> Tambah Produk Baru</a>
      </div>

      <div class="card" style="background: var(--primary); color: white; margin-bottom: 24px;">
        <i data-lucide="folder" style="margin-bottom: 16px; opacity: 0.8;"></i>
        <p style="font-size: 12px; margin-bottom: 4px; opacity: 0.9;">Semua Produk</p>
        <h2 id="total-products" style="font-size: 28px;">0</h2>
      </div>

      <div class="card" style="padding: 0;">
        <div style="padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
          <h3 style="font-size: 14px;">Item Inventaris</h3>
          <div style="position: relative;">
            <i data-lucide="search" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-muted);"></i>
            <input type="text" class="form-control" placeholder="Cari" style="padding-left: 32px; width: 200px;">
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th><input type="checkbox"></th>
              <th>Nama Produk</th>
              <th>Kategori</th>
              <th>Harga</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="product-table-body">
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    window.editProduct = function(id) {
      // Fitur Edit: akan membawa id produk ke tambah-produk
      window.location.href = `tambah-produk.html?edit=${id}`;
    };

    window.deleteProduct = async function(id) {
      if(!confirm('Anda yakin ingin menghapus produk ini?')) return;
      try {
        const res = await fetch(`${API_BASE}/admin/produk/${id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        const json = await res.json();
        if(json.success) {
          alert('Produk dihapus!');
          window.location.reload();
        } else {
          alert('Gagal menghapus: ' + json.message);
        }
      } catch(err) {
        alert('Terjadi kesalahan saat menghapus.');
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      const tbody = document.getElementById('product-table-body');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:32px;">Memuat produk...</td></tr>';

      try {
        const res = await fetch(`${API_BASE}/produk`);
        const json = await res.json();

        if (!json.success || !json.data || json.data.length === 0) {
          document.getElementById('total-products').textContent = '0';
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:32px;">Belum ada produk. Silakan tambah produk baru.</td></tr>';
          return;
        }

        const products = json.data;
        document.getElementById('total-products').textContent = products.length;

        let html = '';
        products.forEach(p => {
          html += `
            <tr>
              <td><input type="checkbox"></td>
              <td style="display: flex; align-items: center; gap: 12px;">
                <img src="${p.image_url || 'https://via.placeholder.com/32'}" style="width: 32px; height: 32px; border-radius: 4px; object-fit: cover;" onerror="this.src='https://via.placeholder.com/32'">
                <strong>${p.nama}</strong>
              </td>
              <td>${p.kategori}</td>
              <td>${formatRpAdmin(p.harga_min)}</td>
              <td>
                <label style="display:inline-flex; align-items:center; cursor:pointer;">
                  <input type="checkbox" checked style="margin-right: 8px;"> Aktif
                </label>
              </td>
              <td>
                <button onclick="editProduct('${p.id}')" style="border:none; background:none; cursor:pointer; color:var(--text-muted);"><i data-lucide="edit" style="width:16px;"></i></button>
                <button onclick="deleteProduct('${p.id}')" style="border:none; background:none; cursor:pointer; color:var(--danger); margin-left:8px;"><i data-lucide="trash-2" style="width:16px;"></i></button>
              </td>
            </tr>
          `;
        });
        tbody.innerHTML = html;
        if (window.lucide) lucide.createIcons();
      } catch (err) {
        console.error('Gagal memuat produk:', err);
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:32px; color:var(--danger);">Gagal terhubung ke server</td></tr>';
      }
    });
  </script>
</body>
</html>
