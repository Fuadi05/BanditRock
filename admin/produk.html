<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Produk - Syarif Art Stone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="width:36px; height:36px; background: var(--primary); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink:0;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        <span>Syarif Art Stone</span>
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item active"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Admin</div>
        <a href="profil.html" class="menu-item"><i data-lucide="user"></i> Profil</a>
        <a href="login.html" onclick="logoutAdmin(event)" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Produk</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge" style="display:none;">0</span>
        </button>
        <div class="avatar" id="topbar-avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 16px;">Ringkasan Inventaris</h2>
        <a href="tambah-produk.html" class="btn-primary"><i data-lucide="plus"></i> Tambah Produk Baru</a>
      </div>

      <div class="card" style="background: var(--primary); color: white; margin-bottom: 24px;">
        <i data-lucide="folder" style="margin-bottom: 16px; opacity: 0.8;"></i>
        <p style="font-size: 12px; margin-bottom: 4px; opacity: 0.9;">Semua Produk</p>
        <h2 id="total-products" style="font-size: 28px;">0</h2>
      </div>

      <div class="card" style="padding: 0;">
        <div style="padding: 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
          <h3 style="font-size: 14px;">Item Inventaris</h3>
          <div style="position: relative;">
            <i data-lucide="search" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-muted);"></i>
            <input type="text" id="search-product" class="form-control" placeholder="Cari..." style="padding-left: 32px; width: 200px;">
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox"></th>
              <th>Nama Produk</th>
              <th>Kategori</th>
              <th>Harga</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="product-table-body">
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch(`${API_BASE}/produk`);
        const json = await res.json();

        if (json.success && json.data) {
          const products = json.data;
          document.getElementById('total-products').textContent = products.length;

          const tbody = document.getElementById('product-table-body');
          if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:24px;">Belum ada produk</td></tr>';
          } else {
            tbody.innerHTML = products.map(p => `
              <tr>
                <td><input type="checkbox"></td>
                <td style="display:flex; align-items:center; gap:12px; font-weight:600;">
                  <img src="${p.gambar || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:6px; object-fit:cover;">
                  <span>${p.nama}</span>
                </td>
                <td>${p.kategori || '-'}</td>
                <td style="font-weight:700; color:var(--primary);">${formatRpAdmin(p.harga)}</td>
                <td><span class="badge disetujui">Aktif</span></td>
                <td>
                  <a href="tambah-produk.html?edit=${p.id}" style="color:var(--primary); font-weight:600; text-decoration:none; margin-right:12px;">Edit</a>
                  <button onclick="deleteProduct('${p.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:600;">Hapus</button>
                </td>
              </tr>
            `).join('');
          }
        }
      } catch (err) {
        console.error('Gagal memuat produk:', err);
      }
    });

    async function deleteProduct(id) {
      if (!confirm('Apakah Anda yakin ingin menghapus produk ini?')) return;
      try {
        const res = await fetch(`${API_BASE}/admin/produk/${id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        const json = await res.json();
        if (handleApiAuthError(res, json)) return;

        if (json.success) {
          alert('Produk berhasil dihapus');
          window.location.reload();
        } else {
          alert('Gagal menghapus produk');
        }
      } catch (err) {
        alert('Terjadi kesalahan koneksi');
      }
    }
  </script>
</body>
</html>
