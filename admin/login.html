<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Banditrock</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-color);
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      text-align: center;
    }
    .login-logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <i data-lucide="shield-check"></i> Banditrock Admin
    </div>
    <form id="login-form">
      <div class="error-msg" id="error-msg">Username atau Password salah!</div>
      <div class="form-group" style="text-align: left;">
        <label>Username</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="form-group" style="text-align: left; margin-bottom: 24px;">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px;">Login ke Panel</button>
    </form>
  </div>

  <script src="js/admin.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      
      if(user === 'admin' && pass === 'admin123') {
        localStorage.setItem('banditrock_admin_auth', 'true');
        window.location.href = 'index.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
