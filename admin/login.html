<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Banditrock</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-color);
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      text-align: center;
    }
    .login-logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <i data-lucide="shield-check"></i> Banditrock Admin
    </div>
    <form id="login-form">
      <div class="error-msg" id="error-msg">Nama Pengguna atau Kata Sandi salah!</div>
      <div class="form-group" style="text-align: left;">
        <label>Nama Pengguna</label>
        <input type="text" id="username" class="form-control" required>
      </div>
      <div class="form-group" style="text-align: left; margin-bottom: 24px;">
        <label>Kata Sandi</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 12px;">Masuk ke Panel</button>
    </form>
  </div>

  <script src="js/admin.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      errorEl.style.display = 'none';
      submitBtn.textContent = 'Memproses...';
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();

        if (data.success && data.data && data.data.token) {
          localStorage.setItem('banditrock_token', data.data.token);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = data.message || 'Login gagal!';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Tidak dapat terhubung ke server.';
        errorEl.style.display = 'block';
      } finally {
        submitBtn.textContent = 'Masuk ke Panel';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
