<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Order Kustom - Banditrock Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="background: var(--primary); color: white; padding: 4px; border-radius: 6px;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        Banditrock
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item active"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Admin</div>
        <a href="#" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Produk</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <form id="add-custom-order-form">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2 style="font-size: 16px;">Formulir Orderan Kustom Produk</h2>
          <div style="display: flex; gap: 12px;">
            <button type="button" class="btn-primary" style="background: var(--text-main);" onclick="window.history.back()">Cancel</button>
            <button type="submit" class="btn-primary">Save & Publish</button>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px;">
          
          <!-- Left Column -->
          <div style="display: flex; flex-direction: column; gap: 16px;">
            
            <div class="form-group" style="margin-bottom:0;">
              <label>Nama Lengkap <span style="color:var(--danger)">*</span></label>
              <input type="text" id="cust-name" class="form-control" placeholder="Contoh: Budi Santoso" required>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Nomor Telepon <span style="color:var(--danger)">*</span></label>
              <input type="text" class="form-control" placeholder="0812xxxxxxxx" required>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Nama Produk <span style="color:var(--danger)">*</span></label>
              <input type="text" class="form-control" placeholder="Misal: Patung Doraemon" required>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Deskripsi Produk</label>
              <textarea class="form-control" rows="4" placeholder="Misal: Ukuran 19 Meter"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group" style="margin-bottom:0;">
                <label>Provinsi <span style="color:var(--danger)">*</span></label>
                <input type="text" id="cust-prov" class="form-control" placeholder="Pilih Provinsi" required>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label>Kabupaten/Kota <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" placeholder="Pilih Kabupaten/Kota" required>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group" style="margin-bottom:0;">
                <label>Kecamatan <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" placeholder="Pilih Kecamatan" required>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label>Desa/Kelurahan <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" placeholder="Pilih Desa/Kelurahan" required>
              </div>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Alamat Pengiriman <span style="color:var(--danger)">*</span></label>
              <textarea class="form-control" rows="3" placeholder="Tuliskan alamat lengkap pengiriman..." required></textarea>
            </div>

          </div>

          <!-- Right Column -->
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div class="form-group" style="margin-bottom: 0;">
              <label>Pilih Lokasi di Peta <span style="color:var(--danger)">*</span></label>
            </div>
            <!-- Map Placeholder Container -->
            <div style="background-color: #E2E8F0; border-radius: 12px; border: 1px solid var(--border-color); width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; margin-top: -8px;">
              <!-- Map Background Mock -->
              <div style="position: absolute; top: 16px; left: 16px; right: 16px; bottom: 16px; background: #D1D5DB; border-radius: 16px; opacity: 0.5;">
                <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.5) 10px, rgba(255,255,255,0.5) 20px);"></div>
              </div>
              
              <!-- Map Button -->
              <button type="button" style="background: white; border: none; padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 14px; color: #1E293B; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; position: relative; z-index: 2;">
                <i data-lucide="map-pin" style="width: 18px; height: 18px; color: #10B981;"></i>
                Klik untuk memperbesar peta
              </button>
            </div>
          </div>

        </div>
      </form>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    document.getElementById('add-custom-order-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const sales = JSON.parse(localStorage.getItem('banditrock_sales') || '[]');
      
      const newOrder = {
        id: 'CST-' + Math.floor(Math.random() * 10000),
        pelanggan: document.getElementById('cust-name').value,
        tgl: new Date().toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric'}),
        total: 0,
        metode: 'Order Kustom',
        status: 'Konfirmasi',
        provinsi: document.getElementById('cust-prov').value
      };
      
      sales.unshift(newOrder);
      localStorage.setItem('banditrock_sales', JSON.stringify(sales));
      
      alert('Order Kustom berhasil disimpan!');
      window.location.href = 'penjualan.html';
    });
  </script>
</body>
</html>
