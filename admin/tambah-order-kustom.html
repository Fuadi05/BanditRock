<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambah Order Kustom - Syarif Art Stone Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="sidebar-logo">
        <div style="width:36px; height:36px; background: var(--primary); color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink:0;"><i data-lucide="layers" style="color: white; width:20px; height:20px;"></i></div> 
        <span>Syarif Art Stone</span>
      </a>
    </div>
    
    <div class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-label">Menu Utama</div>
        <a href="index.html" class="menu-item"><i data-lucide="home"></i> Dasbor</a>
        <a href="penjualan.html" class="menu-item"><i data-lucide="shopping-cart"></i> Penjualan Produk</a>
        <a href="laporan.html" class="menu-item"><i data-lucide="star"></i> Laporan</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">Produk</div>
        <a href="tambah-order-kustom.html" class="menu-item active"><i data-lucide="plus-circle"></i> Tambah Order Kustom</a>
        <a href="tambah-produk.html" class="menu-item"><i data-lucide="plus-circle"></i> Tambah Produk</a>
        <a href="produk.html" class="menu-item"><i data-lucide="box"></i> Daftar Produk</a>
      </div>
      
      <div class="menu-group">
        <div class="menu-label">ADMIN</div>
        <a href="profil.html" class="menu-item"><i data-lucide="user"></i> Profil</a>
        <a href="login.html" onclick="logoutAdmin(event)" id="btn-logout" class="menu-item"><i data-lucide="log-out"></i> Keluar</a>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <h1 class="page-title">Produk</h1>
      <div class="topbar-right">
        <button class="notif-btn">
          <i data-lucide="bell"></i>
          <span class="notif-badge">4</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <form id="add-custom-order-form">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
          <h2 style="font-size: 16px;">Formulir Orderan Kustom Produk</h2>
          <div style="display: flex; gap: 12px;">
            <button type="button" class="btn-primary" style="background: var(--text-main);" onclick="window.history.back()">Cancel</button>
            <button type="submit" class="btn-primary">Save & Publish</button>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px;">
          
          <!-- Left Column -->
          <div style="display: flex; flex-direction: column; gap: 16px;">
            
            <div class="form-group" style="margin-bottom:0;">
              <label>Nama Lengkap <span style="color:var(--danger)">*</span></label>
              <input type="text" id="cust-name" class="form-control" placeholder="Contoh: Budi Santoso" required>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Nomor Telepon <span style="color:var(--danger)">*</span></label>
              <input type="text" id="cust-phone" class="form-control" placeholder="0812xxxxxxxx" required>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Nama Produk <span style="color:var(--danger)">*</span></label>
              <input type="text" class="form-control" placeholder="Misal: Patung Doraemon" required>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Deskripsi Produk</label>
              <textarea class="form-control" rows="4" placeholder="Misal: Ukuran 19 Meter"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group" style="margin-bottom:0;">
                <label>Provinsi <span style="color:var(--danger)">*</span></label>
                <input type="text" id="cust-prov" class="form-control" placeholder="Pilih Provinsi" required>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label>Kabupaten/Kota <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" placeholder="Pilih Kabupaten/Kota" required>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group" style="margin-bottom:0;">
                <label>Kecamatan <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" placeholder="Pilih Kecamatan" required>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label>Desa/Kelurahan <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" placeholder="Pilih Desa/Kelurahan" required>
              </div>
            </div>

            <div class="form-group" style="margin-bottom:0;">
              <label>Alamat Pengiriman <span style="color:var(--danger)">*</span></label>
              <textarea class="form-control" rows="3" placeholder="Tuliskan alamat lengkap pengiriman..." required></textarea>
            </div>

          </div>

          <!-- Right Column -->
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <div class="form-group" style="margin-bottom: 0;">
              <label>Pilih Lokasi di Peta <span style="color:var(--danger)">*</span></label>
              <p style="font-size:11px; color:var(--text-muted); margin-bottom:8px;">Geser dan klik pada peta untuk menentukan titik kordinat.</p>
            </div>
            
            <div id="map" style="width: 100%; height: 400px; border-radius: 12px; border: 1px solid var(--border-color); z-index: 1;"></div>
            
            <input type="hidden" id="cust-lat" name="lat">
            <input type="hidden" id="cust-lng" name="lng">
          </div>

        </div>
      </form>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Map
      const map = L.map('map').setView([-6.200000, 106.816666], 13); // Default to Jakarta
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      let marker;

      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        
        document.getElementById('cust-lat').value = lat;
        document.getElementById('cust-lng').value = lng;

        if (marker) {
          marker.setLatLng(e.latlng);
        } else {
          marker = L.marker(e.latlng).addTo(map);
        }
      });
    });
  </script>
  <script>
    document.getElementById('add-custom-order-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.textContent = 'Menyimpan...';
      submitBtn.disabled = true;

      // Note: Karena UI form order kustom belum memiliki daftar item secara spesifik, 
      // kita kirimkan data dummy product_id untuk memenuhi schema database.
      // Nantinya Anda bisa mengembangkan UI untuk memilih produk secara spesifik.
      const payload = {
        nama_pembeli: document.getElementById('cust-name').value,
        telepon: document.getElementById('cust-phone').value,
        items: [
          {
            product_id: "00000000-0000-0000-0000-000000000000", // Ganti dengan ID produk "Order Kustom" di DB jika ada
            qty: 1,
            harga_disepakati: 0 // Harga 0, bisa diedit nanti, atau tambahkan input harga di form
          }
        ]
      };
      
      try {
        const res = await fetch(`${API_BASE}/admin/order`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });
        
        const json = await res.json();
        if (json.success) {
          alert('Order Kustom berhasil disimpan ke database!');
          window.location.href = 'penjualan.html';
        } else {
          alert('Gagal: ' + (json.message || 'Terjadi kesalahan'));
        }
      } catch (err) {
        console.error(err);
        alert('Tidak dapat terhubung ke server.');
      } finally {
        submitBtn.textContent = 'Save & Publish';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
